name: Deploy to GitHub Pages

# The site is served from the gh-pages branch (created automatically by
# GitHub Pages when the branch first appeared). The whole repo is the site,
# so deploying is just fast-forwarding gh-pages to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish main to gh-pages
        run: git push --force origin HEAD:gh-pages
